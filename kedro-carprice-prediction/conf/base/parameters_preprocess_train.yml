# This is a boilerplate parameters config generated for pipeline 'preprocess_train'
# using Kedro 1.3.1.
#
# Documentation for this file format can be found in "Parameters"
# Link: https://docs.kedro.org/en/1.3.1/configuration/parameters.html


car_train_no_outliers:
  type: MemoryDataset

car_train_imputed:
  type: MemoryDataset

car_val_imputed:
  type: MemoryDataset

imputation_stats:
  type: pickle.PickleDataset
  filepath: data/06_models/imputation_stats.pkl

car_train_fe:
  type: pandas.ParquetDataset
  filepath: data/04_feature/car_train_fe.parquet

car_val_fe:
  type: pandas.ParquetDataset
  filepath: data/04_feature/car_val_fe.parquet

engineered_feature_group_metadata:
  type: MemoryDataset

car_train_features:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/car_train_features.parquet

car_val_features:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/car_val_features.parquet

scaler_method: Standard
target_col: price
engineered_group_name: engineered_car_features
engineered_group_description: 
  Engineered features generated from the cleaned car dataset for
  model training and inference.