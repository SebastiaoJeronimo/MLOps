# KIND cluster for car-price-api (Week 5).
# Adjust extraMounts hostPath to your local MLOPS_Project/mlartifacts folder.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: C:/IMS/MLOps/MLOps/MLOPS_Project/mlartifacts
        containerPath: /mlartifacts
        readOnly: true
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "CriticalAddonsOnly=true,eks-k8s-version=1.29"
  - role: worker
    extraMounts:
      - hostPath: C:/IMS/MLOps/MLOps/MLOPS_Project/mlartifacts
        containerPath: /mlartifacts
        readOnly: true
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "CriticalAddonsOnly=true,eks-k8s-version=1.29"
  - role: worker
    extraMounts:
      - hostPath: C:/IMS/MLOps/MLOps/MLOPS_Project/mlartifacts
        containerPath: /mlartifacts
        readOnly: true
    labels:
      "CriticalAddonsOnly": "true"
      "eks-k8s-version": "1.29"
