apiVersion: apps/v1
kind: Deployment
metadata:
  name: car-price-api
  labels:
    app: car-price-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: car-price-api
  template:
    metadata:
      labels:
        app: car-price-api
    spec:
      containers:
        - name: car-price-api
          image: car-price-api-kubernetes:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://host.docker.internal:8080"
            - name: MLFLOW_ARTIFACT_MOUNT
              value: "/mlartifacts"
            - name: PREDICTION_HISTORY_DIR
              value: "/data/predictions"
          volumeMounts:
            - name: prediction-history
              mountPath: /data/predictions
            - name: mlartifacts
              mountPath: /mlartifacts
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: prediction-history
          hostPath:
            path: /tmp/car-price-history
            type: DirectoryOrCreate
        - name: mlartifacts
          hostPath:
            path: /mlartifacts
            type: Directory
