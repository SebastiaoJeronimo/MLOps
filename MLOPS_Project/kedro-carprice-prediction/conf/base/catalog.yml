# Data catalog — dataset names must match pipeline node inputs/outputs.

car_train_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/train.csv

car_test_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/test.csv

data_quality_report:
  type: pandas.CSVDataset
  filepath: data/08_reporting/data_quality_report.csv

car_train_clean:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/car_train_clean.parquet

car_test_clean:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/car_test_clean.parquet

car_train_split:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/car_train_split.parquet

car_val_split:
  type: pandas.ParquetDataset
  filepath: data/02_intermediate/car_val_split.parquet

# In-memory pipeline intermediates
preprocessed_train:
  type: MemoryDataset

preprocessed_val:
  type: MemoryDataset

car_batch_imputed:
  type: MemoryDataset

car_batch_fe:
  type: MemoryDataset

preprocessed_test:
  type: pandas.ParquetDataset
  filepath: data/03_primary/preprocess_test.parquet

imputation_stats:
  type: pickle.PickleDataset
  filepath: data/04_feature/imputation_stats.pkl

preprocessing_artifacts:
  type: pickle.PickleDataset
  filepath: data/04_feature/preprocessing_artifacts.pkl

feature_group_metadata:
  type: kedro_mlflow.io.artifacts.MlflowArtifactDataset
  dataset:
    type: json.JSONDataset
    filepath: data/08_reporting/feature_group_metadata.json

car_feature_view_metadata:
  type: kedro_mlflow.io.artifacts.MlflowArtifactDataset
  dataset:
    type: json.JSONDataset
    filepath: data/08_reporting/car_feature_view_metadata.json

X_train:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_train.parquet

y_train:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/y_train.parquet

X_val:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/X_val.parquet

y_val:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/y_val.parquet

car_price_model_input:
  type: pandas.ParquetDataset
  filepath: data/05_model_input/car_price_model_input.parquet

best_params:
  type: json.JSONDataset
  filepath: data/06_models/best_params.json

trained_model:
  type: MemoryDataset

val_metrics:
  type: MemoryDataset

registration_metadata:
  type: MemoryDataset

model_train_report:
  type: MemoryDataset

champion_model:
  type: MemoryDataset

predictions:
  type: pandas.CSVDataset
  filepath: data/07_model_output/predictions.csv

drift_report_html:
  type: text.TextDataset
  filepath: data/08_reporting/drift_report.html

drift_metrics:
  type: json.JSONDataset
  filepath: data/08_reporting/drift_metrics.json
